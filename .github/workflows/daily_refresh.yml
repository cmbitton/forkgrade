name: Daily Data Refresh

on:
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC = 6 AM EST / 7 AM EDT
  workflow_dispatch:        # allow manual runs

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # ── Run all DB scripts in the app container ────────────────────────────
      # nice -n 10 lowers CPU priority so the web server preempts imports
      # whenever a request comes in.
      # DATABASE_URL, SECRET_KEY, and GEMINI_API_KEY are Fly secrets and are
      # automatically available inside the container.
      - name: Daily data refresh
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl ssh console -a forkgrade -C "bash -c 'nice -n 10 python3 -u scripts/import_ri.py --days=5 && nice -n 10 python3 -u scripts/import_nyc.py --days=3 && nice -n 10 python3 -u scripts/import_houston.py --days=10 --chunk-days=0 && nice -n 10 python3 -u scripts/import_maricopa.py && nice -n 10 python3 -u scripts/import_philadelphia.py --days=5 && nice -n 10 python3 -u scripts/import_florida.py --days=5 && nice -n 10 python3 -u scripts/import_chicago.py --days=5 && nice -n 10 python3 -u scripts/import_boston.py --days=5 && nice -n 10 python3 -u scripts/generate_summaries.py --limit 5000 && nice -n 10 python3 -u scripts/precompute_insights.py'"
