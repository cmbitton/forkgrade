name: Weekly RI Full Sync

on:
  schedule:
    - cron: '0 9 * * 0'  # Every Sunday at 9:00 UTC = 4 AM EST / 5 AM EDT
  workflow_dispatch:       # allow manual runs

jobs:
  full-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Full sync RI inspections
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl ssh console -a forkgrade -C "bash -c 'nice -n 10 python3 -u scripts/import_ri.py --full-sync && nice -n 10 python3 -u scripts/generate_summaries.py --limit 500 && nice -n 10 python3 -u scripts/precompute_insights.py rhode-island'"
